<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>超级语音输入</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="brand">
        <span class="brand-title">超级语音输入</span>
        <span id="health" class="badge badge-muted">连接中…</span>
      </div>
      <nav class="tabs">
        <button type="button" class="tab active" data-tab="workflow">工作流程</button>
        <button type="button" class="tab" data-tab="history">历史会话</button>
      </nav>
    </header>

    <div id="toast" class="toast" hidden></div>

    <main class="layout">
      <!-- 工作流程 -->
      <section id="panel-workflow" class="tab-panel active">
        <p id="statusLine" class="status-line">请先新建会话，再开始录音。每一段停止后会自动上传并由豆包转写。</p>

        <!-- ① 会话 -->
        <article class="card">
          <div class="card-head">
            <span class="step">1</span>
            <h2>会话与输出样式</h2>
          </div>
          <div class="card-body controls-row">
            <label class="field">
              <span class="label">标题（可选）</span>
              <input id="sessionTitle" type="text" placeholder="例如：本周想法整理" />
            </label>
            <label class="field grow">
              <span class="label">场景预设（应用后同步整理模式与默认投递目标）</span>
              <select id="presetSelect">
                <option value="">— 不使用预设 —</option>
              </select>
            </label>
            <label class="field grow">
              <span class="label">整理模式（DeepSeek 按此生成终稿）</span>
              <select id="sessionMode" required>
                <option value="intent_cleanup">原意清理 · 适合对话框粘贴</option>
                <option value="obsidian_note">Obsidian 笔记 · Markdown</option>
                <option value="task_requirement">任务/需求 · 协作开发</option>
                <option value="faithful_transcript">忠实转录 · 少改动</option>
              </select>
            </label>
            <label class="field">
              <span class="label">转写引擎</span>
              <select id="sttProvider">
                <option value="doubao" selected>豆包 · 语音转写</option>
              </select>
            </label>
            <label class="field">
              <span class="label">整理引擎</span>
              <select id="rewriteProvider">
                <option value="deepseek" selected>DeepSeek · 文稿整理</option>
              </select>
            </label>
            <button type="button" id="createSessionBtn" class="btn btn-primary">新建会话</button>
          </div>
          <div id="sessionSummary" class="session-summary muted">尚未创建会话</div>
        </article>

        <!-- ② 录音 -->
        <article class="card">
          <div class="card-head">
            <span class="step">2</span>
            <h2>录音</h2>
          </div>
          <div class="card-body">
            <div class="wave-wrap">
              <canvas id="waveCanvas" width="900" height="120"></canvas>
              <div class="wave-overlay">
                <span id="recordTimer" class="timer">00:00</span>
              </div>
            </div>
            <p class="hint">波形实时反映麦克风输入；未录音时为直线属正常现象。</p>
            <div class="controls-row actions">
              <button type="button" id="startRecordBtn" class="btn btn-accent" disabled>● 开始录音</button>
              <button type="button" id="stopRecordBtn" class="btn" disabled>■ 停止本段并转写</button>
            </div>
            <p class="hint subtle">
              停止一段后会<strong>自动上传 → 豆包转写</strong>。可多次「开始录音」补充多段。
            </p>
          </div>
        </article>

        <!-- ③ 片段 -->
        <article class="card">
          <div class="card-head">
            <span class="step">3</span>
            <h2>片段进度</h2>
          </div>
          <div class="card-body">
            <div id="segments" class="segment-list"></div>
          </div>
        </article>

        <!-- ④ 终稿 -->
        <article class="card card-final">
          <div class="card-head">
            <span class="step">4</span>
            <h2>DeepSeek 生成终稿</h2>
          </div>
          <div class="card-body">
            <div class="controls-row">
              <button type="button" id="finalizeBtn" class="btn btn-primary btn-large" disabled>
                合并全部转写并由 DeepSeek 生成终稿
              </button>
              <button type="button" id="copyBtn" class="btn" disabled>复制终稿（Output Router）</button>
            </div>
            <div class="controls-row flex-wrap" style="margin-top: 10px">
              <span class="hint subtle" style="width: 100%">投递（经后端 OutputRouter 审计；文件类依赖 .env 路径）</span>
              <button type="button" id="outClipboardBtn" class="btn" disabled>剪贴板</button>
              <button type="button" id="outPasteBtn" class="btn" disabled>粘贴到前台窗口</button>
              <button type="button" id="outMdBtn" class="btn" disabled>Markdown 文件</button>
              <button type="button" id="outObsidianBtn" class="btn" disabled>Obsidian Inbox</button>
              <button type="button" id="outGaehBtn" class="btn" disabled>GAEH inbox</button>
              <button type="button" id="outPresetBtn" class="btn" disabled>按预设默认投递</button>
            </div>
            <label class="field full">
              <span class="label">输出预览</span>
              <textarea id="finalText" rows="14" readonly placeholder="生成后将显示在这里…"></textarea>
            </label>
            <details class="advanced">
              <summary>高级：用另一种整理模式重新生成</summary>
              <div class="controls-row margin-top">
                <select id="refinalizeMode">
                  <option value="intent_cleanup">原意清理 · 适合对话框粘贴</option>
                  <option value="obsidian_note">Obsidian 笔记 · Markdown</option>
                  <option value="task_requirement">任务/需求 · 协作开发</option>
                  <option value="faithful_transcript">忠实转录 · 少改动</option>
                </select>
                <button type="button" id="refinalizeBtn" class="btn">按所选模式重新整理</button>
              </div>
            </details>
          </div>
        </article>

        <details class="advanced flat">
          <summary>高级：手动填写音频路径（一般不常用）</summary>
          <div class="controls-row margin-top">
            <input id="audioPath" type="text" placeholder="https://… 或服务器可访问的路径" class="grow" />
            <input id="audioDuration" type="number" step="0.1" placeholder="时长(s)" style="width: 6rem" />
            <button type="button" id="addSegmentBtn" class="btn">仅添加片段记录</button>
          </div>
        </details>
      </section>

      <!-- 历史 -->
      <section id="panel-history" class="tab-panel">
        <article class="card">
          <div class="card-head">
            <h2>历史会话</h2>
            <button type="button" id="refreshHistoryBtn" class="btn btn-small">刷新</button>
            <button type="button" id="clearHistoryBtn" class="btn btn-small">清除历史</button>
          </div>
          <div class="card-body">
            <div id="history" class="history-list"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="./svi-shared.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
