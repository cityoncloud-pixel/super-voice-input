<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>超级语音 · 悬浮</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        margin: 0;
        padding: 14px;
        max-width: 420px;
      }
      .overlay-title {
        font-weight: 600;
        margin-bottom: 8px;
      }
      .ov-status {
        font-size: 13px;
        color: #9aa4b2;
        margin: 8px 0 12px;
        line-height: 1.45;
      }
      .ov-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }
      .hint-keys {
        font-size: 12px;
        color: #6b7380;
        margin-top: 8px;
      }
      .ov-transcript {
        margin-top: 10px;
        padding: 10px;
        max-height: 180px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.45;
        color: #c8cdd5;
        background: #141820;
        border-radius: 8px;
        border: 1px solid #2a3344;
      }
      .ov-seg {
        margin-bottom: 10px;
      }
      .ov-seg:last-child {
        margin-bottom: 0;
      }
      .ov-seg-meta {
        display: block;
        font-size: 11px;
        color: #7a8699;
        margin-bottom: 4px;
      }
      .ov-seg-txt {
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="overlay-title">超级语音输入 · 悬浮入口</div>
    <div id="ovStatus" class="ov-status">未创建会话。可先打开主面板或使用下方「新建会话」。</div>
    <div id="ovTranscript" class="ov-transcript">暂无片段。停止本段后将在此显示豆包转写进度与文本。</div>
    <div class="ov-actions">
      <button type="button" id="ovNew" class="btn btn-primary btn-small">新建会话</button>
      <button type="button" id="ovRec" class="btn btn-accent btn-small" disabled>● 录音</button>
      <button type="button" id="ovStop" class="btn btn-small" disabled>■ 停止本段</button>
    </div>
    <div class="ov-actions">
      <button type="button" id="ovFin" class="btn btn-primary btn-small" disabled>整理终稿</button>
      <button type="button" id="ovCopy" class="btn btn-small" disabled>路由 · 剪贴板</button>
    </div>
    <p class="hint-keys">
      全局快捷键：<kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Space</kbd> 切换本段录音 /
      <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Enter</kbd> 触发整理（须已新建会话并有可整理片段）
    </p>
    <script src="./svi-shared.js"></script>
    <script src="./overlay.js"></script>
  </body>
</html>
